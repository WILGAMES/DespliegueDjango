{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURO - Consultorio Jurídico ICESI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-buro {
            background-image: url('/static/accounts/img/bgLogin.svg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="{% block body_class %}min-h-screen bg-gray-900 bg-buro{% endblock %}">

    {% if messages %}
    <div class="fixed top-4 right-4 z-50 space-y-2">
        {% for message in messages %}
        <div class="p-4 rounded-xl text-sm shadow-lg
            {% if message.tags == 'success' %}bg-green-500/20 text-green-300 border border-green-500/30
            {% elif message.tags == 'error' %}bg-red-500/20 text-red-300 border border-red-500/30
            {% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}
    {% endblock content %}

</body>
</html>
