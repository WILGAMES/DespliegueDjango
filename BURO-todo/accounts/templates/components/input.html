<div>
    <label class="block text-sm font-semibold text-slate-700 mb-1.5">
        {{ label }}{% if required %} <span class="text-red-500">*</span>{% endif %}
    </label>
    {{ field }}
    {% if field.errors %}
        <p class="text-red-500 text-xs mt-1.5">{{ field.errors.0 }}</p>
    {% endif %}
</div>
