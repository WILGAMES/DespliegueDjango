{% if status == 'Pendiente' %}
<span class="inline-flex rounded-full bg-[#FDE68A]/20 px-3 py-1 text-xs font-semibold text-[#D97706]">Pendiente</span>
{% elif status == 'En proceso' or status == 'En proceso' %}
<span class="inline-flex rounded-full bg-[#93C5FD]/20 px-3 py-1 text-xs font-semibold text-[#1D4ED8]">En proceso</span>
{% elif status == 'Finalizado' or status == 'Cerrado' %}
<span class="inline-flex rounded-full bg-[#A7F3D0]/20 px-3 py-1 text-xs font-semibold text-[#047857]">Finalizado</span>
{% else %}
<span class="inline-flex rounded-full bg-[#1E293B]/90 px-3 py-1 text-xs font-semibold text-[#E2E8F0]">{{ status }}</span>
{% endif %}
