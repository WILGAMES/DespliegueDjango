{% extends 'accounts/dashboard_base.html' %}

{% block dashboard_content %}
<div class="space-y-6">

  <section class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
    <p class="text-xs uppercase tracking-widest text-gray-400">Mi sala</p>
    <h2 class="mt-2 text-2xl font-semibold text-gray-900">Casos activos</h2>
    <p class="mt-1 text-sm text-gray-500">Casos asignados a tu sala jurídica.</p>
  </section>

  <section class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
    <div id="cases-container" class="space-y-3">
      <p class="text-sm text-gray-400">Cargando casos...</p>
    </div>
  </section>

</div>

<script>
  async function loadProfessorCases() {
    const container = document.getElementById('cases-container');
    try {
      const response = await fetch('/cases/professor-cases/');
      if (!response.ok) {
        container.innerHTML = '<p class="text-sm text-red-500">Error al cargar los casos.</p>';
        return;
      }
      const cases = await response.json();
      if (!cases || cases.length === 0) {
        container.innerHTML = `
          <div class="rounded-xl border border-gray-100 bg-gray-50 p-8 text-center">
            <p class="text-gray-500 text-sm">No tienes casos activos en este momento.</p>
          </div>`;
        return;
      }
      container.innerHTML = cases.map(c => `
        <div class="flex items-center justify-between rounded-xl border p-4 transition
          ${c.semaphore === 'red' ? 'border-red-200 bg-red-50' : c.semaphore === 'yellow' ? 'border-yellow-200 bg-yellow-50' : 'border-gray-100 bg-gray-50'}">
          <div class="flex items-center gap-4">
            <span class="h-3 w-3 rounded-full flex-shrink-0
              ${c.semaphore === 'red' ? 'bg-red-500' : c.semaphore === 'yellow' ? 'bg-yellow-400' : 'bg-green-500'}">
            </span>
            <div>
              <p class="text-sm font-semibold text-gray-900">${c.number || 'Caso ' + c.id}</p>
              <p class="mt-0.5 text-xs text-gray-500">
                Estudiante: ${c.student_name || 'Sin asignar'} · Beneficiario: ${c.beneficiary || 'Sin asignar'}
              </p>
              <p class="mt-0.5 text-xs font-medium
                ${c.semaphore === 'red' ? 'text-red-600' : c.semaphore === 'yellow' ? 'text-yellow-600' : 'text-gray-400'}">
                ${c.days_remaining <= 0 ? '⚠ Vencido' : c.days_remaining + ' día(s) restantes'}
              </p>
            </div>
          </div>
          <a href="/cases/${c.id}/"
             class="rounded-lg px-3 py-1.5 text-xs font-semibold text-white transition flex-shrink-0"
             style="background-color:#5454E9;">
            Ver detalle →
          </a>
        </div>
      `).join('');
    } catch (err) {
      container.innerHTML = '<p class="text-sm text-red-500">Error de conexión.</p>';
    }
  }
  document.addEventListener('DOMContentLoaded', loadProfessorCases);
</script>
{% endblock dashboard_content %}
